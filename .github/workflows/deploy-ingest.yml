name: deploy-ingest

on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - "scripts/deploy_ingest.sh"
      - ".github/workflows/deploy-ingest.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ingest job
        env:
          GITHUB_SHA: ${{ github.sha }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          CONTAINERAPPS_ENVIRONMENT: ${{ vars.CONTAINERAPPS_ENVIRONMENT }}
          STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
          INGEST_JOB_NAME: ${{ vars.INGEST_JOB_NAME }}
          RAW_CONTAINER: ${{ vars.RAW_CONTAINER }}
          PARSED_CONTAINER: ${{ vars.PARSED_CONTAINER }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          CPU: ${{ vars.INGEST_CPU }}
          MEMORY: ${{ vars.INGEST_MEMORY }}
          REPLICA_TIMEOUT: ${{ vars.INGEST_REPLICA_TIMEOUT }}
          PARALLELISM: ${{ vars.INGEST_PARALLELISM }}
          COMPLETIONS: ${{ vars.INGEST_COMPLETIONS }}
          INGEST_CRON: ${{ vars.INGEST_CRON }}
        run: bash ./scripts/deploy_ingest.sh
