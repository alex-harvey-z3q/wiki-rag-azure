name: deploy-ingest

on:
  push:
    branches: [main]
    paths:
      - "ingest/**"
      - "scripts/deploy_ingest.sh"
      - ".github/workflows/deploy-ingest.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug Azure secret presence
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          test -n "$AZURE_CLIENT_ID" && echo "AZURE_CLIENT_ID present" || echo "AZURE_CLIENT_ID missing"
          test -n "$AZURE_TENANT_ID" && echo "AZURE_TENANT_ID present" || echo "AZURE_TENANT_ID missing"
          test -n "$AZURE_SUBSCRIPTION_ID" && echo "AZURE_SUBSCRIPTION_ID present" || echo "AZURE_SUBSCRIPTION_ID missing"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ingest job
        env:
          GITHUB_SHA: ${{ github.sha }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CONTAINERAPPS_ENVIRONMENT: ${{ vars.CONTAINERAPPS_ENVIRONMENT }}
          STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
          INGEST_JOB_NAME: ${{ vars.INGEST_JOB_NAME }}
          RAW_CONTAINER: ${{ vars.RAW_CONTAINER }}
          PARSED_CONTAINER: ${{ vars.PARSED_CONTAINER }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          CPU: ${{ vars.INGEST_CPU }}
          MEMORY: ${{ vars.INGEST_MEMORY }}
          REPLICA_TIMEOUT: ${{ vars.INGEST_REPLICA_TIMEOUT }}
          PARALLELISM: ${{ vars.INGEST_PARALLELISM }}
          COMPLETIONS: ${{ vars.INGEST_COMPLETIONS }}
          INGEST_CRON: ${{ vars.INGEST_CRON }}
        run: bash ./scripts/deploy_ingest.sh
