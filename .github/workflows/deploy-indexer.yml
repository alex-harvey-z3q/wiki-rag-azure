name: deploy-indexer

on:
  push:
    branches: [main]
    paths:
      - "indexer/**"
      - "scripts/deploy_indexer.sh"
      - ".github/workflows/deploy-indexer.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy indexer job
        env:
          GITHUB_SHA: ${{ github.sha }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          CONTAINERAPPS_ENVIRONMENT: ${{ vars.CONTAINERAPPS_ENVIRONMENT }}
          KV_READER_IDENTITY_ID: ${{ vars.KV_READER_IDENTITY_ID }}
          KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
          POSTGRES_FQDN: ${{ vars.POSTGRES_FQDN }}
          STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
          INDEXER_JOB_NAME: ${{ vars.INDEXER_JOB_NAME }}
          POSTGRES_ADMIN_USERNAME: ${{ vars.POSTGRES_ADMIN_USERNAME }}
          PGVECTOR_SCHEMA: ${{ vars.PGVECTOR_SCHEMA }}
          PGVECTOR_TABLE: ${{ vars.PGVECTOR_TABLE }}
          PARSED_CONTAINER: ${{ vars.PARSED_CONTAINER }}
          PARSED_PREFIX: ${{ vars.PARSED_PREFIX }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          CPU: ${{ vars.INDEXER_CPU }}
          MEMORY: ${{ vars.INDEXER_MEMORY }}
          REPLICA_TIMEOUT: ${{ vars.INDEXER_REPLICA_TIMEOUT }}
          PARALLELISM: ${{ vars.INDEXER_PARALLELISM }}
          COMPLETIONS: ${{ vars.INDEXER_COMPLETIONS }}
          INDEXER_CRON: ${{ vars.INDEXER_CRON }}
        run: bash ./scripts/deploy_indexer.sh
